<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <!-- Dramatic gradient for bars -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#DC0000"/>
      <stop offset="60%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#FFEB00"/>
    </linearGradient>
    <linearGradient id="barGrad2030" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="50%" stop-color="#DC0000"/>
      <stop offset="100%" stop-color="#FFEB00"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#DC0000"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FFEB00"/>
    </marker>
    <!-- Explosion glow for POMMI -->
    <radialGradient id="pomiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEB00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DC0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid line pattern -->
    <pattern id="gridH" width="60" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="60" y2="10" stroke="#222" stroke-width="0.5" stroke-dasharray="3,3"/>
    </pattern>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="450" fill="#1a1a2e"/>

  <!-- Subtle grid -->
  <rect x="70" y="60" width="470" height="300" fill="url(#gridH)"/>

  <!-- Horizontal grid lines -->
  <line x1="70" y1="90" x2="540" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="70" y1="130" x2="540" y2="130" stroke="#333" stroke-width="0.5"/>
  <line x1="70" y1="170" x2="540" y2="170" stroke="#333" stroke-width="0.5"/>
  <line x1="70" y1="210" x2="540" y2="210" stroke="#333" stroke-width="0.5"/>
  <line x1="70" y1="250" x2="540" y2="250" stroke="#333" stroke-width="0.5"/>

  <!-- Y-axis -->
  <line x1="70" y1="60" x2="70" y2="360" stroke="#32BDEF" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="70" y1="360" x2="540" y2="360" stroke="#32BDEF" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="62" y="363" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">0€</text>
  <text x="62" y="323" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">500k</text>
  <text x="62" y="283" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">1M</text>
  <text x="62" y="243" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">1.5M</text>
  <text x="62" y="203" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">2M</text>
  <text x="62" y="163" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">3M</text>
  <text x="62" y="123" fill="#999" font-size="9" text-anchor="end" font-family="Arial, sans-serif">4M</text>
  <text x="62" y="83" fill="#FFEB00" font-size="9" text-anchor="end" font-family="Arial, sans-serif" font-weight="bold">5M</text>

  <!-- ============================================ -->
  <!-- BARS - scaled: 5M = 290px height (chart area 300px, with 10px top margin) -->
  <!-- Scale: 1€ = 290/5000000 = 0.000058 px per euro -->
  <!-- 50k = 2.9px -> min 12px visible -->
  <!-- 120k = 6.96px -> min 15px -->
  <!-- 250k = 14.5px -->
  <!-- 450k = 26.1px -->
  <!-- 1.2M = 69.6px -->
  <!-- 5M = 290px (goes to top) -->
  <!-- ============================================ -->

  <!-- Bar 1990: 50 000€ -->
  <rect x="90" y="352" width="55" height="8" rx="2" fill="url(#barGrad)" stroke="#DC0000" stroke-width="0.5"/>
  <text x="117" y="345" fill="#FFEB00" font-size="11" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">50 000€</text>
  <text x="117" y="378" fill="#ccc" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">1990</text>

  <!-- Bar 2000: 120 000€ -->
  <rect x="165" y="353" width="55" height="7" rx="2" fill="url(#barGrad)" stroke="#DC0000" stroke-width="0.5"/>
  <text x="192" y="346" fill="#FFEB00" font-size="11" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">120 000€</text>
  <text x="192" y="378" fill="#ccc" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2000</text>

  <!-- Bar 2010: 250 000€ -->
  <rect x="240" y="345" width="55" height="15" rx="2" fill="url(#barGrad)" stroke="#DC0000" stroke-width="0.5"/>
  <text x="267" y="338" fill="#FFEB00" font-size="11" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">250 000€</text>
  <text x="267" y="378" fill="#ccc" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2010</text>

  <!-- Bar 2020: 450 000€ -->
  <rect x="315" y="333" width="55" height="27" rx="2" fill="url(#barGrad)" stroke="#DC0000" stroke-width="0.5"/>
  <text x="342" y="326" fill="#FFEB00" font-size="11" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">450 000€</text>
  <text x="342" y="378" fill="#ccc" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2020</text>

  <!-- Bar 2025: 1 200 000€ -->
  <rect x="390" y="290" width="55" height="70" rx="2" fill="url(#barGrad)" stroke="#DC0000" stroke-width="1"/>
  <text x="417" y="283" fill="#FFEB00" font-size="11" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">1 200 000€</text>
  <text x="417" y="378" fill="#ccc" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2025</text>

  <!-- Bar 2030: 5 000 000€ - THE BIG ONE -->
  <rect x="465" y="60" width="55" height="300" rx="2" fill="url(#barGrad2030)" stroke="#FFEB00" stroke-width="2"/>
  <!-- Pulsing glow effect on 2030 bar -->
  <rect x="463" y="58" width="59" height="304" rx="3" fill="none" stroke="#FFEB00" stroke-width="1" stroke-dasharray="4,4" opacity="0.7"/>
  <text x="492" y="52" fill="#FFEB00" font-size="14" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">5 000 000€</text>
  <text x="492" y="378" fill="#FFEB00" font-size="12" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2030</text>
  <text x="492" y="392" fill="#DC0000" font-size="9" text-anchor="middle" font-style="italic" font-family="Arial, sans-serif">(ennuste)</text>

  <!-- ============================================ -->
  <!-- RED ARROWS pointing UP between bars -->
  <!-- ============================================ -->

  <!-- Arrow 1990 -> 2000 -->
  <path d="M148,355 L158,345" stroke="#DC0000" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Arrow 2000 -> 2010 -->
  <path d="M223,348 L233,335" stroke="#DC0000" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Arrow 2010 -> 2020 -->
  <path d="M298,340 L308,328" stroke="#DC0000" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Arrow 2020 -> 2025 - bigger arrow -->
  <path d="M373,330 L383,295" stroke="#DC0000" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  <text x="380" y="313" fill="#DC0000" font-size="8" font-weight="bold" font-family="Arial, sans-serif">↑</text>

  <!-- Arrow 2025 -> 2030 - HUGE arrow -->
  <path d="M448,288 L458,100" stroke="#DC0000" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>
  <!-- Extra dramatic arrows for the 2030 jump -->
  <path d="M452,288 L462,95" stroke="#FFEB00" stroke-width="2" fill="none" marker-end="url(#arrowYellow)"/>
  <text x="455" y="190" fill="#DC0000" font-size="14" font-weight="bold" font-family="Arial, sans-serif" transform="rotate(-90,455,190)">!!!</text>

  <!-- ============================================ -->
  <!-- TITLE -->
  <!-- ============================================ -->
  <text x="300" y="35" fill="#FFEB00" font-size="26" text-anchor="middle" font-weight="bold" font-family="Impact, 'Arial Black', Arial, sans-serif" letter-spacing="2">ASUNTOHINNAT SUOMESSA</text>
  <!-- Underline accent -->
  <line x1="130" y1="40" x2="470" y2="40" stroke="#DC0000" stroke-width="3"/>

  <!-- ============================================ -->
  <!-- POMMI! label - top right explosion badge -->
  <!-- ============================================ -->
  <circle cx="530" cy="38" r="35" fill="url(#pomiGlow)" opacity="0.5"/>
  <circle cx="530" cy="38" r="28" fill="#DC0000" stroke="#FFEB00" stroke-width="3"/>
  <text x="530" y="35" fill="#FFEB00" font-size="16" text-anchor="middle" font-weight="bold" font-family="Impact, 'Arial Black', Arial, sans-serif" letter-spacing="1">POMMI!</text>
  <text x="530" y="51" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">🔥</text>

  <!-- ============================================ -->
  <!-- Subtitle -->
  <!-- ============================================ -->
  <text x="300" y="415" fill="#32BDEF" font-size="15" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif" font-style="italic">Miksi hinta nousee? Koska nousee.</text>
  <line x1="100" y1="425" x2="500" y2="425" stroke="#32BDEF" stroke-width="1" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- Tabloid-style footer -->
  <!-- ============================================ -->
  <text x="300" y="442" fill="#888" font-size="8" text-anchor="middle" font-family="Arial, sans-serif">Lähde: Päänsärki ja unet | Iltajupinat.fi</text>

  <!-- ============================================ -->
  <!-- Decorative corner elements -->
  <!-- ============================================ -->
  <line x1="10" y1="10" x2="30" y2="10" stroke="#DC0000" stroke-width="3"/>
  <line x1="10" y1="10" x2="10" y2="30" stroke="#DC0000" stroke-width="3"/>
  <line x1="590" y1="10" x2="570" y2="10" stroke="#DC0000" stroke-width="3"/>
  <line x1="590" y1="10" x2="590" y2="30" stroke="#DC0000" stroke-width="3"/>
  <line x1="10" y1="440" x2="30" y2="440" stroke="#DC0000" stroke-width="3"/>
  <line x1="10" y1="440" x2="10" y2="420" stroke="#DC0000" stroke-width="3"/>
  <line x1="590" y1="440" x2="570" y2="440" stroke="#DC0000" stroke-width="3"/>
  <line x1="590" y1="440" x2="590" y2="420" stroke="#DC0000" stroke-width="3"/>
</svg>
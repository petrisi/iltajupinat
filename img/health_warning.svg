<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="barGrad78" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC0000"/>
      <stop offset="100%" stop-color="#ff3333"/>
    </linearGradient>
    <linearGradient id="barGrad45" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC0000"/>
      <stop offset="100%" stop-color="#ff5555"/>
    </linearGradient>
    <linearGradient id="barGrad23" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8200"/>
      <stop offset="100%" stop-color="#ffaa44"/>
    </linearGradient>
    <linearGradient id="barGrad12" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8200"/>
      <stop offset="100%" stop-color="#ffbb66"/>
    </linearGradient>
    <linearGradient id="barGrad8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFEB00"/>
      <stop offset="100%" stop-color="#ffee66"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC0000"/>
      <stop offset="50%" stop-color="#b80000"/>
      <stop offset="100%" stop-color="#DC0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" fill="url(#bgGrad)" rx="8"/>

  <!-- Outer border -->
  <rect x="3" y="3" width="594" height="444" fill="none" stroke="#DC0000" stroke-width="3" rx="8"/>
  <rect x="8" y="8" width="584" height="434" fill="none" stroke="#FF8200" stroke-width="1" rx="6"/>

  <!-- Top hazard stripe pattern -->
  <pattern id="hazard" patternUnits="userSpaceOnUse" width="20" height="20">
    <rect width="10" height="20" fill="#FFEB00"/>
    <rect x="10" width="10" height="20" fill="#1a1a1a"/>
  </pattern>
  <rect x="10" y="10" width="580" height="5" fill="url(#hazard)"/>

  <!-- Skull & crossbones left -->
  <g transform="translate(28, 38)" filter="url(#shadow)">
    <circle cx="12" cy="8" r="10" fill="none" stroke="#DC0000" stroke-width="2"/>
    <line x1="4" y1="22" x2="20" y2="22" stroke="#DC0000" stroke-width="2"/>
    <line x1="8" y1="22" x2="8" y2="30" stroke="#DC0000" stroke-width="2"/>
    <line x1="16" y1="22" x2="16" y2="30" stroke="#DC0000" stroke-width="2"/>
    <circle cx="8" cy="7" r="1.5" fill="#DC0000"/>
    <circle cx="16" cy="7" r="1.5" fill="#DC0000"/>
    <path d="M7,12 Q12,16 17,12" fill="none" stroke="#DC0000" stroke-width="1.5"/>
  </g>

  <!-- Skull & crossbones right -->
  <g transform="translate(552, 38)" filter="url(#shadow)">
    <circle cx="12" cy="8" r="10" fill="none" stroke="#DC0000" stroke-width="2"/>
    <line x1="4" y1="22" x2="20" y2="22" stroke="#DC0000" stroke-width="2"/>
    <line x1="8" y1="22" x2="8" y2="30" stroke="#DC0000" stroke-width="2"/>
    <line x1="16" y1="22" x2="16" y2="30" stroke="#DC0000" stroke-width="2"/>
    <circle cx="8" cy="7" r="1.5" fill="#DC0000"/>
    <circle cx="16" cy="7" r="1.5" fill="#DC0000"/>
    <path d="M7,12 Q12,16 17,12" fill="none" stroke="#DC0000" stroke-width="1.5"/>
  </g>

  <!-- WARNING triangle left -->
  <g transform="translate(56, 32)" filter="url(#glow)">
    <polygon points="14,0 28,24 0,24" fill="#FFEB00" stroke="#DC0000" stroke-width="1.5"/>
    <text x="14" y="21" text-anchor="middle" font-size="18" font-weight="900" fill="#DC0000" font-family="Arial, sans-serif">!</text>
  </g>

  <!-- WARNING triangle right -->
  <g transform="translate(524, 32)" filter="url(#glow)">
    <polygon points="14,0 28,24 0,24" fill="#FFEB00" stroke="#DC0000" stroke-width="1.5"/>
    <text x="14" y="21" text-anchor="middle" font-size="18" font-weight="900" fill="#DC0000" font-family="Arial, sans-serif">!</text>
  </g>

  <!-- Header bar -->
  <rect x="80" y="18" width="440" height="48" rx="6" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="300" y="42" text-anchor="middle" font-size="22" font-weight="900" fill="#FFEB00" font-family="Impact, 'Arial Black', Arial, sans-serif" letter-spacing="2" filter="url(#shadow)">⚠ VAROITUS: NÄMÄ OIREET ⚠</text>
  <text x="300" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#FFEB00" opacity="0.8" font-family="Arial, sans-serif" letter-spacing="1">SUOMALAISEN TERVEYSKRIISIN TOSIASIAT</text>

  <!-- Subtitle divider -->
  <line x1="100" y1="74" x2="500" y2="74" stroke="#DC0000" stroke-width="1.5"/>

  <!-- Data rows with bars -->

  <!-- ROW 1: Perkele-oireyhtymä 78% -->
  <g transform="translate(90, 84)">
    <!-- Alert icon -->
    <polygon points="6,0 12,10 0,10" fill="#DC0000"/>
    <text x="6" y="9" text-anchor="middle" font-size="7" fill="#fff" font-weight="900">!</text>
    <!-- Label -->
    <text x="18" y="8" font-size="13" font-weight="900" fill="#FFEB00" font-family="Arial, sans-serif">Perkele-oireyhtymä</text>
    <text x="18" y="22" font-size="10" fill="#cccccc" font-family="Arial, sans-serif">suomalaisista</text>
    <!-- Bar bg -->
    <rect x="18" y="28" width="420" height="14" rx="4" fill="#333"/>
    <!-- Bar fill 78% -->
    <rect x="18" y="28" width="328" height="14" rx="4" fill="url(#barGrad78)"/>
    <!-- Percentage -->
    <text x="450" y="40" text-anchor="end" font-size="16" font-weight="900" fill="#fff" font-family="Arial, sans-serif">78%</text>
  </g>

  <!-- ROW 2: Sisu-kipu 45% -->
  <g transform="translate(90, 130)">
    <polygon points="6,0 12,10 0,10" fill="#DC0000"/>
    <text x="6" y="9" text-anchor="middle" font-size="7" fill="#fff" font-weight="900">!</text>
    <text x="18" y="8" font-size="13" font-weight="900" fill="#FFEB00" font-family="Arial, sans-serif">Sisu-kipu</text>
    <text x="18" y="22" font-size="10" fill="#cccccc" font-family="Arial, sans-serif">työikäisistä</text>
    <rect x="18" y="28" width="420" height="14" rx="4" fill="#333"/>
    <rect x="18" y="28" width="189" height="14" rx="4" fill="url(#barGrad45)"/>
    <text x="450" y="40" text-anchor="end" font-size="16" font-weight="900" fill="#fff" font-family="Arial, sans-serif">45%</text>
  </g>

  <!-- ROW 3: Kalsarikänse-kuume 23% -->
  <g transform="translate(90, 176)">
    <polygon points="6,0 12,10 0,10" fill="#FF8200"/>
    <text x="6" y="9" text-anchor="middle" font-size="7" fill="#fff" font-weight="900">!</text>
    <text x="18" y="8" font-size="13" font-weight="900" fill="#FFEB00" font-family="Arial, sans-serif">Kalsarikänse-kuume</text>
    <text x="18" y="22" font-size="10" fill="#cccccc" font-family="Arial, sans-serif">nuorista</text>
    <rect x="18" y="28" width="420" height="14" rx="4" fill="#333"/>
    <rect x="18" y="28" width="97" height="14" rx="4" fill="url(#barGrad23)"/>
    <text x="450" y="40" text-anchor="end" font-size="16" font-weight="900" fill="#fff" font-family="Arial, sans-serif">23%</text>
  </g>

  <!-- ROW 4: Reilu peli-värinä 12% -->
  <g transform="translate(90, 222)">
    <polygon points="6,0 12,10 0,10" fill="#FF8200"/>
    <text x="6" y="9" text-anchor="middle" font-size="7" fill="#fff" font-weight="900">!</text>
    <text x="18" y="8" font-size="13" font-weight="900" fill="#FFEB00" font-family="Arial, sans-serif">Reilu peli-värinä</text>
    <text x="18" y="22" font-size="10" fill="#cccccc" font-family="Arial, sans-serif">eläkeläisistä</text>
    <rect x="18" y="28" width="420" height="14" rx="4" fill="#333"/>
    <rect x="18" y="28" width="50" height="14" rx="4" fill="url(#barGrad12)"/>
    <text x="450" y="40" text-anchor="end" font-size="16" font-weight="900" fill="#fff" font-family="Arial, sans-serif">12%</text>
  </g>

  <!-- ROW 5: Mökkipäivä-syndrooma 8% -->
  <g transform="translate(90, 268)">
    <polygon points="6,0 12,10 0,10" fill="#FFEB00"/>
    <text x="6" y="9" text-anchor="middle" font-size="7" fill="#DC0000" font-weight="900">!</text>
    <text x="18" y="8" font-size="13" font-weight="900" fill="#FFEB00" font-family="Arial, sans-serif">Mökkipäivä-syndrooma</text>
    <text x="18" y="22" font-size="10" fill="#cccccc" font-family="Arial, sans-serif">kaikista</text>
    <rect x="18" y="28" width="420" height="14" rx="4" fill="#333"/>
    <rect x="18" y="28" width="34" height="14" rx="4" fill="url(#barGrad8)"/>
    <text x="450" y="40" text-anchor="end" font-size="16" font-weight="900" fill="#fff" font-family="Arial, sans-serif">8%</text>
  </g>

  <!-- Divider line -->
  <line x1="90" y1="312" x2="530" y2="312" stroke="#FF8200" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- "HÄMMÄSTYTTÄVÄ!" badge -->
  <g transform="translate(180, 326)" filter="url(#glow)">
    <rect x="0" y="0" width="240" height="44" rx="8" fill="#DC0000" stroke="#FFEB00" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-size="24" font-weight="900" fill="#FFEB00" font-family="Impact, 'Arial Black', Arial, sans-serif" letter-spacing="3">HÄMMÄSTYTTÄVÄ!</text>
  </g>

  <!-- Bottom hazard stripe -->
  <rect x="10" y="435" width="580" height="5" fill="url(#hazard)"/>

  <!-- Footer text -->
  <text x="300" y="430" text-anchor="middle" font-size="9" fill="#888" font-family="Arial, sans-serif">Lähde: Tapahtuma.fi tutkimus 2025 · Ei todellinen lääketieteellinen tieto</text>

  <!-- Decorative medical cross corners -->
  <g opacity="0.3" fill="#DC0000">
    <!-- Top-left corner accent -->
    <rect x="14" y="14" width="4" height="14" rx="1"/>
    <rect x="8" y="18" width="16" height="4" rx="1"/>
    <!-- Bottom-right corner accent -->
    <rect x="582" y="422" width="4" height="14" rx="1"/>
    <rect x="576" y="426" width="16" height="4" rx="1"/>
  </g>
</svg>
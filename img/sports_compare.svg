<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Hockey gradient -->
    <linearGradient id="hockeyBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC0000"/>
      <stop offset="100%" stop-color="#A00000"/>
    </linearGradient>
    <!-- Football gradient -->
    <linearGradient id="footballBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#004E6E"/>
      <stop offset="100%" stop-color="#0084B4"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEB00"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowR" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#DC0000"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0084B4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#111111"/>

  <!-- Subtle diagonal stripes background -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="40"/>
    <line x1="100" y1="0" x2="600" y2="300" stroke="#fff" stroke-width="40"/>
    <line x1="200" y1="0" x2="600" y2="200" stroke="#fff" stroke-width="40"/>
    <line x1="300" y1="0" x2="600" y2="100" stroke="#fff" stroke-width="40"/>
    <line x1="0" y1="100" x2="400" y2="400" stroke="#fff" stroke-width="40"/>
    <line x1="0" y1="200" x2="200" y2="400" stroke="#fff" stroke-width="40"/>
  </g>

  <!-- Border frame -->
  <rect x="3" y="3" width="594" height="394" fill="none" stroke="#FFEB00" stroke-width="4" rx="4"/>
  <rect x="8" y="8" width="584" height="384" fill="none" stroke="#333" stroke-width="1"/>

  <!-- ===== TITLE BAR ===== -->
  <rect x="15" y="12" width="570" height="48" rx="4" fill="#1a1a1a" stroke="#FFEB00" stroke-width="2"/>
  <text x="300" y="44" text-anchor="middle" font-family="Impact, 'Arial Black', Arial, sans-serif" font-size="28" font-weight="900" fill="url(#titleGrad)" filter="url(#shadow)" letter-spacing="2">
    ⚡ JÄÄKIEKKO vs. JALKAPALLO ⚡
  </text>

  <!-- ===== TOSIASIA! Label ===== -->
  <g transform="translate(300, 72)" filter="url(#glow)">
    <polygon points="0,-16 30,-12 40,0 30,12 0,16 -30,12 -40,0 -30,-12" fill="#FFEB00" stroke="#FF6600" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Impact, 'Arial Black', Arial, sans-serif" font-size="16" font-weight="900" fill="#111" letter-spacing="3">
      TOSIASIA!
    </text>
  </g>

  <!-- ===== VS divider line ===== -->
  <line x1="295" y1="100" x2="295" y2="380" stroke="#FFEB00" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>

  <!-- ===== LEFT SIDE - HOCKEY ===== -->
  <rect x="15" y="100" width="270" height="4" rx="2" fill="#DC0000"/>
  <!-- Hockey header -->
  <rect x="15" y="104" width="270" height="36" rx="3" fill="url(#hockeyBg)"/>
  <text x="150" y="128" text-anchor="middle" font-family="Impact, 'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#FFEB00" letter-spacing="1">
    🏒 JÄÄKIEKKO
  </text>

  <!-- Hockey stats bars -->
  <!-- Katsojia -->
  <g transform="translate(15, 152)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Katsojia MM-kisoissa</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="250" height="18" rx="2" fill="#DC0000"/>
    <text x="255" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">4,5 milj.</text>
  </g>

  <!-- Urheilutoimittajia -->
  <g transform="translate(15, 190)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Urheilutoimittajia</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="240" height="18" rx="2" fill="#DC0000"/>
    <text x="255" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">340</text>
  </g>

  <!-- Palkkiot -->
  <g transform="translate(15, 228)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Palkkiot</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="245" height="18" rx="2" fill="#DC0000"/>
    <text x="255" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">10M€</text>
  </g>

  <!-- Kylmät sormet -->
  <g transform="translate(15, 266)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Kylmät sormet</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="255" height="18" rx="2" fill="#DC0000"/>
    <text x="255" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">99%</text>
  </g>

  <!-- ===== RIGHT SIDE - FOOTBALL ===== -->
  <rect x="315" y="100" width="270" height="4" rx="2" fill="#0084B4"/>
  <!-- Football header -->
  <rect x="315" y="104" width="270" height="36" rx="3" fill="url(#footballBg)"/>
  <text x="450" y="128" text-anchor="middle" font-family="Impact, 'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#FFEB00" letter-spacing="1">
    ⚽ JALKAPALLO
  </text>

  <!-- Football stats bars -->
  <!-- Katsojia -->
  <g transform="translate(315, 152)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Katsojia MM-kisoissa</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="3" height="18" rx="1" fill="#0084B4"/>
    <text x="12" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">12</text>
  </g>

  <!-- Urheilutoimittajia -->
  <g transform="translate(315, 190)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Urheilutoimittajia</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="5" height="18" rx="1" fill="#0084B4"/>
    <text x="14" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">3</text>
  </g>

  <!-- Palkkiot -->
  <g transform="translate(315, 228)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Palkkiot</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="2" height="18" rx="1" fill="#0084B4"/>
    <text x="10" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#FFEB00" font-weight="900">500€</text>
  </g>

  <!-- Kylmät sormet -->
  <g transform="translate(315, 266)">
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ccc" font-weight="bold">Kylmät sormet</text>
    <rect x="0" y="18" width="260" height="18" rx="2" fill="#222" stroke="#555" stroke-width="1"/>
    <rect x="0" y="18" width="0" height="18" rx="1" fill="#0084B4" opacity="0"/>
    <text x="0" y="31" font-family="Impact, Arial, sans-serif" font-size="14" fill="#888" font-weight="900">0%</text>
  </g>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="15" y="330" width="570" height="55" rx="4" fill="#1a1a1a" stroke="#FFEB00" stroke-width="2"/>
  <!-- Arrow from hockey -->
  <line x1="150" y1="320" x2="280" y2="355" stroke="#DC0000" stroke-width="3" marker-end="url(#arrowR)" opacity="0.7"/>
  <!-- Arrow from football -->
  <line x1="450" y1="320" x2="320" y2="355" stroke="#0084B4" stroke-width="3" marker-end="url(#arrowB)" opacity="0.7"/>

  <text x="300" y="355" text-anchor="middle" font-family="Impact, 'Arial Black', Arial, sans-serif" font-size="20" font-weight="900" fill="#FFEB00" filter="url(#shadow)" letter-spacing="1">
    SUOMALAISET TIETÄÄN MITÄ HALUAT! 🇫🇮
  </text>
  <text x="300" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888" font-style="italic">
    Lähde: Selvä juttu · Iltajupinat 2025
  </text>

  <!-- Decorative corner accents -->
  <path d="M15,55 L15,15 L55,15" fill="none" stroke="#DC0000" stroke-width="3"/>
  <path d="M585,55 L585,15 L545,15" fill="none" stroke="#0084B4" stroke-width="3"/>
  <path d="M15,345 L15,385 L55,385" fill="none" stroke="#DC0000" stroke-width="3"/>
  <path d="M585,345 L585,385 L545,385" fill="none" stroke="#0084B4" stroke-width="3"/>
</svg>